<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swappy | Adaugă produs</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <a href="../index.html" class="logo">
        Swappy<span>.</span>
    </a>
</header>

<main class="container">

    <div class="add-form-card">

        <h1>Pune un anunț nou</h1>

        <p style="color:var(--brown); margin-bottom:30px;">
            Completează detaliile pentru a găsi partenerul perfect de schimb.
        </p>

        <form>

            <div class="form-group">
                <label>Ce oferi la schimb?</label>

                <input type="text" placeholder="Ex: Rucsac munte 20L">
            </div>

            <div class="form-group">

                <label>În ce categorie se potrivește?</label>

                <select>
                    <option>Cărți</option>
                    <option>Gadgeturi</option>
                    <option>Haine</option>
                    <option>Accesorii</option>
                    <option>Animale</option>
                    <option>Mobilă</option>
                    <option>Jucării</option>
                    <option>Sport</option>
                </select>

            </div>

            <div class="form-group">

                <label>Descrie obiectul</label>

                <textarea rows="5" placeholder="Spune-ne mai multe detalii..."></textarea>

            </div>

            <div class="form-group">

                <label>
                    <i class="fa-solid fa-image"></i>
                    Adaugă un link către imagine
                </label>

                <input type="text" placeholder="URL-ul imaginii">

            </div>

            <a href="../index.html"
               class="btn-add"
               style="width:100%; justify-content:center; padding:20px; text-decoration:none; display:flex;">

                Publică anunțul

            </a>

        </form>

    </div>

</main>
<footer>

    <p>&copy; Swappy. Creat pentru comunitatea elevilor.</p>

 <div style="display:flex; gap:20px;">

        <a href="siguranta.html">Siguranță</a>
        <a href="termeni.html">Termeni</a>
    </div>

</footer>
</body>
</html>
